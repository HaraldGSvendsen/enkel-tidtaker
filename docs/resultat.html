<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tidtaker - resultat</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 10px;
      background: #f4f4f4;
    }

    h2 {
      text-align: center;
    }

    .track {
      margin-bottom: 20px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .track h3 {
      margin: 0;
      padding: 10px;
      background: #007bff;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      padding: 8px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    th {
      text-align: left;
      background: #fafafa;
    }

    .rank {
      font-weight: bold;
    }

    .leader {
      background: #e6f4ff;
    }

    .updated {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
    .incomplete {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<h2>Resultater</h2>
<div id="app">Laster...</div>
<div class="updated" id="updated"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwu56adqkRakxdeAUIEQyBbGBOezmU0EmwBWkVOYSHap4PP80L8879GuT0DvvZKxvEFJA/exec?page=results";

async function load() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    render(data);
  } catch (e) {
    document.getElementById("app").innerHTML = "Feil ved lasting";
    console.error(e);
  }
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('no-NO', { hour12: false });
}

function formatDuration(ms) {
  if (ms == null || ms < 0) {
    return "—";
  }
  const total = Math.floor(ms / 1000);
  const h = String(Math.floor(total / 3600)).padStart(2, '0');
  const m = String(Math.floor((total % 3600) / 60)).padStart(2, '0');
  const s = String(total % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function render(data) {
  if (!data.tracks || data.tracks.length === 0) {
    document.getElementById("app").innerHTML = "Ingen resultater ennå";
    return;
  }

  let html = "";

  data.tracks.forEach(track => {
    html += `<div class="track">`;
    html += `<h3>${track.track}</h3>`;
    html += `<table>`;
    html += `
      <tr>
        <th>#</th>
        <th>Startnr</th>
        <th>Navn</th>
        <th>Tid</th>
      </tr>
    `;

    track.runners.forEach(r => {
      html += `
        <tr class="${r.durationMs == null ? 'incomplete' : (r.rank === 1 ? 'leader' : '')}">
          <td class="rank">${r.rank}</td>
          <td>${r.bib}</td>
          <td>${r.name}</td>
          <td>${formatDuration(r.durationMs)}</td>
        </tr>
      `;
    });

    html += `</table></div>`;
  });

  document.getElementById("app").innerHTML = html;
  document.getElementById("updated").innerText =
    "Oppdatert: " + formatTime(data.updated);
}

// Auto refresh
setInterval(load, 10000);
load();
</script>

</body>
</html>
